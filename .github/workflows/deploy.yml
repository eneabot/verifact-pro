name: Deploy VeritasAI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true

      - name: Build
        run: npm run build
        env:
          OPENAI_API_KEY: ''
          ANTHROPIC_API_KEY: ''
          GROQ_API_KEY: ''
          GOOGLE_FACT_CHECK_API_KEY: ''

      - name: Check bundle size
        run: |
          echo "Next.js Build Size:"
          du -sh .next

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "✅ Build successful — VeritasAI"
          echo "📍 Live at: https://veritasai-app.loca.lt (localtunnel)"
          echo "🔄 App is self-hosted via Cloudflare Quick Tunnel on the server"
